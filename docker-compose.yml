services:
  gcs:
    # Local GCS emulator. The app's @google-cloud/storage client talks to this
    # via STORAGE_EMULATOR_HOST; in prod it uses real GCS via the runtime SA.
    image: fsouza/fake-gcs-server:latest
    command: ["-scheme", "http", "-host", "0.0.0.0", "-port", "4443", "-public-host", "gcs:4443"]
    ports:
      - "4443:4443"
    volumes:
      - lowpassd-gcs:/storage

  gcs-init:
    image: curlimages/curl:latest
    depends_on:
      - gcs
    entrypoint:
      - sh
      - -c
      - |
        until curl -sf http://gcs:4443/storage/v1/b >/dev/null 2>&1; do
          echo "waiting for fake-gcs-server..."; sleep 1;
        done;
        for b in lowpassd-raw lowpassd-archive lowpassd-wiki; do
          curl -s -X POST "http://gcs:4443/storage/v1/b?project=lowpassd-local" \
            -H "Content-Type: application/json" -d "{\"name\":\"$$b\"}" >/dev/null;
        done;
        echo "buckets ready";

  lowpassd:
    build: .
    ports:
      - "8080:8080"
    environment:
      GOOGLE_CLOUD_PROJECT: lowpassd-local
      STORAGE_EMULATOR_HOST: http://gcs:4443
      BUCKET_RAW: lowpassd-raw
      BUCKET_ARCHIVE: lowpassd-archive
      BUCKET_WIKI: lowpassd-wiki
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_FLASH_MODEL: ${GEMINI_FLASH_MODEL:-gemini-2.5-flash}
      GEMINI_PRO_MODEL: ${GEMINI_PRO_MODEL:-gemini-2.5-pro}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-0 */6 * * *}
      MAX_LOOKBACK_DAYS: ${MAX_LOOKBACK_DAYS:-7}
      RUN_ON_START: ${RUN_ON_START:-true}
      PORT: "8080"
    depends_on:
      - gcs-init
    restart: unless-stopped

volumes:
  lowpassd-gcs:
